<h2>Transportation Management System</h2>

<table>
  <tr>
    <th>ID</th>
    <th>Vehicle Name</th>
    <th>Driver Name</th>
    <th>Source</th>
    <th>Destination</th>
    <th>Fare</th>
  </tr>

  <tr *ngFor="let item of transports">    
    <td>{{item.id}}</td>
    <td>{{item.vehicleName}}</td>
    <td>{{item.driverName}}</td>
    <td>{{item.source}}</td>
    <td>{{item.destination}}</td>
    <td>{{item.fare}}</td>
  </tr>

</table>
